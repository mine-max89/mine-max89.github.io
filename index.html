<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>تولدت مبارک</title>

<link href="https://fonts.googleapis.com/css2?family=Lalezar&family=Vazirmatn:wght@400;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#090909;
height:100vh;
overflow:hidden;

display:flex;
justify-content:center;
align-items:center;

font-family:'Vazirmatn',sans-serif;

color:white;

position:relative;

}

/* عکس */

#photo{

position:fixed;
inset:0;

width:100%;
height:100%;

object-fit:cover;

opacity:0;

filter:blur(35px) brightness(.55);

transition:
opacity 10s ease,
filter 10s ease;

z-index:1;

}

/* لایه تیره */

.overlay{

position:fixed;
inset:0;

background:rgba(0,0,0,.72);

transition:background 10s ease;

z-index:2;

}

/* محتوا */

.content{

position:relative;
z-index:5;

width:100%;
height:100%;

display:flex;
justify-content:center;
align-items:center;
flex-direction:column;

padding:20px;

}

/* عنوان */

h1{

position:absolute;

top:14%;

left:50%;

transform:translateX(-50%);

font-family:'Lalezar',sans-serif;

font-size:clamp(38px,9vw,62px);

font-weight:normal;

text-align:center;

line-height:1.45;

opacity:0;

transition:opacity .8s ease;

text-shadow:0 0 18px rgba(255,255,255,.25);

}

/* دکمه */

button{

width:min(58vw,240px);

aspect-ratio:1;

border-radius:50%;

border:2px solid rgba(117,212,255,.95);

background:rgba(117,212,255,.07);

color:#dff8ff;

font-family:'Vazirmatn',sans-serif;

font-size:clamp(22px,5vw,30px);

cursor:pointer;

backdrop-filter:blur(15px);

transition:.35s;

box-shadow:
0 0 35px rgba(117,212,255,.18),
inset 0 0 25px rgba(255,255,255,.04);

}

button:hover{

transform:scale(1.05);

box-shadow:0 0 60px rgba(117,212,255,.45);

}

button:active{

transform:scale(.96);

}

.hide{

animation:hide .8s forwards;

}

@keyframes hide{

to{

opacity:0;

transform:scale(.7);

}

}

@media(max-width:500px){

button{

width:64vw;

}

h1{

top:12%;

}

}

</style>

</head>

<body>

<img src="photo.jpg" id="photo">

<div class="overlay" id="overlay"></div>

<div class="content">

<h1 id="title">
تولدت مبارک
<br>
امیر هنده
</h1>

<button id="play">
فشارم بده
</button>

</div>

<audio id="music" src="music.mp3"></audio>

<script>

const btn=document.getElementById("play");
const music=document.getElementById("music");
const photo=document.getElementById("photo");
const overlay=document.getElementById("overlay");
const title=document.getElementById("title");

btn.onclick=()=>{

music.play();

title.style.opacity="1";

photo.style.opacity="1";
photo.style.filter="blur(0px) brightness(1)";

overlay.style.background="rgba(0,0,0,.15)";

btn.classList.add("hide");

setTimeout(()=>{

btn.remove();

},800);

}

</script>

</body>

</html>
